<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Verify - Content Dashboard</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; background: #0f172a; color: #f1f5f9; }
    header { padding: 12px 20px; border-bottom: 1px solid #334155; display: flex; gap: 16px; align-items: baseline; flex-wrap: wrap; }
    header h1 { font-size: 18px; margin: 0; }
    header .summary { color: #94a3b8; font-size: 13px; }
    header .badge { padding: 2px 8px; border-radius: 4px; margin-right: 8px; }
    .ok { background: #166534; color: #f0fdf4; }
    .miss { background: #991b1b; color: #fef2f2; }
    .skip { background: #475569; color: #f1f5f9; }
    main { display: grid; grid-template-columns: minmax(360px, 1fr) 2fr; min-height: calc(100vh - 50px); }
    section { padding: 16px 20px; overflow-y: auto; }
    section.left { border-right: 1px solid #334155; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-top: 24px; }
    .brief { white-space: pre-wrap; font-size: 13px; background: #1e293b; padding: 12px; border-radius: 6px; }
    .item { padding: 8px 10px; border-radius: 6px; background: #1e293b; margin-bottom: 6px; display: flex; gap: 10px; align-items: flex-start; font-size: 13px; }
    .item .label { flex: 1; word-break: break-word; }
    .item .status { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #334155; align-self: flex-start; }
    .item.used { border-left: 4px solid #16a34a; }
    .item.missing { border-left: 4px solid #dc2626; }
    .item.user_skipped { border-left: 4px solid #64748b; opacity: 0.7; }
    .item button { background: #334155; color: #f1f5f9; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    .item button:hover { background: #475569; }
    video { width: 100%; max-height: 60vh; background: #000; border-radius: 6px; }
    .empty { color: #64748b; font-size: 13px; font-style: italic; }
    .edit-mode-toggle { font-size: 11px; padding: 4px 10px; border-radius: 4px; border: 1px solid #2d3748; background: #1a1a2e; color: #94a3b8; cursor: pointer; margin-left: auto; }
    .edit-mode-toggle.on { background: #1e3a5f; color: #93c5fd; border-color: #3b82f6; }
    .scene-row { padding: 9px 10px; border-radius: 6px; background: #1e293b; margin-bottom: 6px; font-size: 12px; color: #cbd5e1; }
    .scene-row-head { display: flex; justify-content: space-between; gap: 10px; }
    .scene-row .time { color: #94a3b8; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
    .scene-text { color: #94a3b8; line-height: 1.5; margin-top: 5px; white-space: pre-wrap; word-break: break-word; }
    .scene-subtitle { color: #bae6fd; }
    body.edit-mode-on .item,
    body.edit-mode-on .video-wrap,
    body.edit-mode-on .scene-row,
    body.edit-mode-on .scene-text { cursor: cell; }
    body.edit-mode-on [data-edit-token]:hover { outline: 1px dashed #3b82f6; outline-offset: 2px; }
    .ec-cross-flash { outline: 2px solid #3b82f6 !important; outline-offset: 2px !important; }
    .inflight-host { display: inline-flex; align-items: center; margin-left: 4px; min-height: 22px; }
    .inflight-badge { display: inline-flex; gap: 6px; align-items: center; padding: 2px 8px;
      border-radius: 10px; font-size: 11px; background: #1e3a5f; color: #93c5fd;
      border: 1px solid #3b82f6; white-space: nowrap; }
    .inflight-badge.running { animation: inflight-pulse 1.5s ease-in-out infinite; }
    .inflight-dot { width: 6px; height: 6px; border-radius: 50%; background: #60a5fa; }
    .inflight-badge .inflight-jid { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; opacity: 0.7; font-size: 10px; }
    .inflight-cancel { cursor: pointer; opacity: 0.65; border: 0; background: transparent; color: inherit;
      padding: 0 0 0 2px; font: inherit; line-height: 1; }
    .inflight-cancel:hover { opacity: 1; color: #f87171; }
    @keyframes inflight-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
      50% { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0); }
    }
    .recent-mutations { margin-top: 20px; padding-top: 12px; border-top: 1px solid #334155;
      font-size: 11px; color: #94a3b8; min-width: 0; }
    .recent-mutations h4 { font-size: 11px; margin: 0 0 6px; color: #cbd5e1; text-transform: uppercase; letter-spacing: 1px; }
    .recent-mut-row { display: flex; gap: 8px; padding: 3px 0; align-items: center; min-width: 0; }
    .recent-mut-time { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; opacity: 0.65; font-size: 10px; }
    .recent-mut-cmd { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .recent-mut-revert { cursor: pointer; color: #93c5fd; font-size: 10px; border: 0; background: transparent; padding: 0; }
    .recent-mut-revert:hover { color: #60a5fa; text-decoration: underline; }
    .recent-mut-empty { color: #64748b; font-size: 11px; }
  </style>
</head>
<body>
<header>
  <h1>Verify <span id="proj"></span></h1>
  <span class="inflight-host" data-project-host data-project-id=""></span>
  <div class="summary">
    <span class="badge ok"><span id="cnt-used">0</span> used</span>
    <span class="badge miss"><span id="cnt-missing">0</span> missing</span>
    <span class="badge skip"><span id="cnt-skipped">0</span> skipped</span>
  </div>
  <button class="edit-mode-toggle" id="vh-edit-toggle" type="button" data-project-id="">Edit mode</button>
</header>
<main>
  <section class="left">
    <h2>Directorial brief</h2>
    <div id="brief" class="brief"></div>

    <h2>Verbatim lines</h2>
    <div id="verbatim_line" class="bucket"></div>
    <h2>Key facts</h2>
    <div id="key_fact" class="bucket"></div>
    <h2>Required images</h2>
    <div id="required_image" class="bucket"></div>
    <h2>Required clips</h2>
    <div id="required_clip" class="bucket"></div>
    <h2>Required sequence</h2>
    <div id="required_sequence" class="bucket"></div>
    <div class="recent-mutations" data-project-id=""></div>
  </section>
  <section class="right">
    <h2>Final video</h2>
    <div class="video-wrap" data-edit-token="" id="video-wrap">
      <video id="video" controls></video>
    </div>
    <h2>Scenes</h2>
    <div id="scenes"></div>
  </section>
</main>
<script>
const projectId = location.pathname.split("/").pop();
document.getElementById("proj").textContent = projectId;
document.getElementById("vh-edit-toggle").setAttribute("data-project-id", projectId);
document.querySelectorAll("[data-project-host], .recent-mutations").forEach((el) => {
  el.setAttribute("data-project-id", projectId);
});

async function refresh() {
  const res = await fetch(`/api/verify/${projectId}`);
  if (!res.ok) {
    const detail = (await res.json().catch(() => ({}))).detail || res.statusText;
    document.body.innerHTML = `<p style="padding:40px">Error: ${res.status} - ${detail}</p>`;
    return;
  }
  const data = await res.json();
  document.getElementById("cnt-used").textContent = data.used_count;
  document.getElementById("cnt-missing").textContent = data.missing_count;
  document.getElementById("cnt-skipped").textContent = data.skipped_count;
  document.getElementById("brief").textContent = data.manifest.video_brief || "(no brief)";

  const buckets = ["verbatim_line", "key_fact", "required_image", "required_clip", "required_sequence"];
  for (const b of buckets) document.getElementById(b).innerHTML = "";

  for (const it of data.items) {
    const el = document.createElement("div");
    el.className = `item ${it.status}`;
    el.setAttribute("data-edit-token", `@manifest:${it.item_id}`);

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = it.label;

    const statusEl = document.createElement("span");
    statusEl.className = "status";
    statusEl.textContent = it.status;

    el.appendChild(label);
    el.appendChild(statusEl);

    if (!it.auto_checked && it.status !== "user_skipped") {
      const manualBtn = document.createElement("button");
      manualBtn.textContent = it.status === "used" ? "unmark" : "mark used";
      manualBtn.onclick = async () => {
        await fetch(`/api/verify/${projectId}/manual-check`, {
          method: "POST",
          headers: {"content-type": "application/json"},
          body: JSON.stringify({item_id: it.item_id, checked: it.status !== "used"}),
        });
        refresh();
      };
      el.appendChild(manualBtn);
    }

    const skipBtn = document.createElement("button");
    skipBtn.textContent = it.status === "user_skipped" ? "un-skip" : "OK to drop";
    skipBtn.onclick = async () => {
      await fetch(`/api/verify/${projectId}/skip`, {
        method: "POST",
        headers: {"content-type": "application/json"},
        body: JSON.stringify({item_id: it.item_id, skipped: it.status !== "user_skipped"}),
      });
      refresh();
    };
    el.appendChild(skipBtn);

    document.getElementById(it.category).appendChild(el);
  }

  for (const b of buckets) {
    const bucket = document.getElementById(b);
    if (bucket.children.length === 0) {
      bucket.innerHTML = '<div class="empty">(none)</div>';
    }
  }

  const v = document.getElementById("video");
  v.src = `/output/${projectId}/compose/final_zh-TW.mp4`;
  v.onerror = () => { v.style.display = "none"; };
  renderScenes(data.scenes_overview || []);
  wireVideoToken(v, data.scenes_overview || []);
}

function renderScenes(scenes) {
  const root = document.getElementById("scenes");
  root.innerHTML = "";
  if (!scenes.length) {
    root.innerHTML = '<div class="empty">(none)</div>';
    return;
  }
  for (const scene of scenes) {
    const row = document.createElement("div");
    row.className = "scene-row";
    row.setAttribute("data-edit-token", `@${scene.id}`);
    const mm = Math.floor((scene.start_sec || 0) / 60);
    const ss = String(Math.floor((scene.start_sec || 0) % 60)).padStart(2, "0");
    const head = document.createElement("div");
    head.className = "scene-row-head";
    head.innerHTML = `<span>${scene.id} - ${scene.section || ""}</span><span class="time">${mm}:${ss}</span>`;
    row.appendChild(head);
    if (scene.narration) {
      const narration = document.createElement("div");
      narration.className = "scene-text";
      narration.setAttribute("data-edit-token", `@${scene.id}/narration`);
      narration.textContent = scene.narration;
      row.appendChild(narration);
    }
    if (scene.subtitle) {
      const subtitle = document.createElement("div");
      subtitle.className = "scene-text scene-subtitle";
      subtitle.setAttribute("data-edit-token", `@${scene.id}/subtitle`);
      subtitle.textContent = scene.subtitle;
      row.appendChild(subtitle);
    }
    row.onclick = () => {
      const v = document.getElementById("video");
      v.currentTime = scene.start_sec || 0;
      wireVideoToken(v, scenes);
    };
    root.appendChild(row);
  }
}

function wireVideoToken(video, scenes) {
  const wrap = document.getElementById("video-wrap");
  if (!wrap) return;
  if (window.__verify_scenes_resolver__) {
    video.removeEventListener("timeupdate", window.__verify_scenes_resolver__);
  }
  if (!Array.isArray(scenes) || !scenes.length) {
    wrap.setAttribute("data-edit-token", "@s1");
    return;
  }
  const handler = () => {
    let idx = 0;
    const t = video.currentTime || 0;
    for (let i = 0; i < scenes.length; i++) {
      if (t >= (scenes[i].start_sec || 0)) idx = i;
    }
    wrap.setAttribute("data-edit-token", `@${scenes[idx].id}`);
  };
  window.__verify_scenes_resolver__ = handler;
  video.addEventListener("timeupdate", handler);
  handler();
}

refresh();
</script>
<script src="/static/tokens.js"></script>
<script src="/static/cost_estimate.js"></script>
<script src="/static/edit_draft.js"></script>
<script src="/static/composer.js"></script>
<script src="/static/edit_mode.js"></script>
<script src="/static/sse_client.js"></script>
<script src="/static/inflight_badge.js"></script>
<script src="/static/dashboard_sse.js"></script>
<script>
  window.DashboardSSE.open(projectId, {
    onFilesChanged: function (paths) {
      if (paths.indexOf("storyboard.json") >= 0 ||
          paths.some(function (path) { return path.indexOf("compose/") === 0; })) {
        refresh();
        window.DashboardSSE.renderRecentMutations(projectId);
      }
    },
  });
  window.DashboardSSE.renderRecentMutations(projectId);
  window.addEventListener("beforeunload", function () {
    window.DashboardSSE.close(projectId);
  });
</script>
<script>
  document.getElementById("vh-edit-toggle").addEventListener("click", () => {
    window.EditMode.toggle(projectId);
  });
  window.EditMode.attach(projectId);
</script>
</body>
</html>
