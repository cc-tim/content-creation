<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }

    .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid #1e1e1e; }
    .header-title { font-size: 16px; font-weight: 600; }
    .header-count { margin-left: 10px; color: #4a5568; font-size: 12px; }
    .header-stats { display: flex; gap: 8px; align-items: center; }
    .stat-pill { font-size: 11px; padding: 3px 8px; border-radius: 4px; }
    .pill-published { background: #16a34a22; color: #16a34a; }
    .pill-rendered  { background: #d9770622; color: #d97706; }
    .pill-storyboard{ background: #6366f122; color: #6366f1; }
    .live-ind { color: #374151; font-size: 11px; padding: 3px 8px; transition: color .3s; }
    .live-ind.pulse { color: #16a34a; }

    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid #1e1e1e; }
    th { text-align: left; padding: 8px 16px; font-size: 10px; text-transform: uppercase;
         letter-spacing: .05em; color: #4a5568; font-weight: 500; }
    tbody tr { border-bottom: 1px solid #141414; transition: background .1s; }
    tbody tr.active { background: #161616; }
    tbody tr.dimmed { opacity: .45; }
    td { padding: 10px 16px; vertical-align: middle; }

    .badge { font-size: 9px; padding: 2px 8px; border-radius: 10px; color: #fff; white-space: nowrap; }
    .s-published  { background: #16a34a; }
    .s-rendered   { background: #d97706; }
    .s-storyboard { background: #6366f1; }
    .s-analyzed   { background: #3b82f6; }
    .s-acquired   { background: #475569; }
    .s-new        { background: #374151; }

    .t-main { color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; }
    .t-id   { color: #4a5568; font-size: 10px; margin-top: 3px; font-family: monospace; user-select: all; }
    .t-miss { color: #4a5568; font-style: italic; }
    a { color: #3b82f6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    a.yt { color: #16a34a; }
    .nil { color: #2d3748; }

    .btn-preview {
      font-size: 11px; padding: 3px 10px; border-radius: 4px; border: 1px solid #2d3748;
      background: #1a1a2e; color: #94a3b8; cursor: pointer; white-space: nowrap;
      transition: background .1s, color .1s;
    }
    .btn-preview:hover { background: #1e293b; color: #e2e8f0; }
    .btn-preview.active { background: #1e293b; color: #e2e8f0; border-color: #3b82f6; }

    .detail-row td { padding: 0; width: 100%; max-width: 0; }
    .detail-panel { padding: 16px 20px; background: #111; border-bottom: 1px solid #1e1e1e; overflow: hidden; }
    video { width: 100%; max-width: 720px; border-radius: 4px; background: #000; display: block; margin: 0 auto 14px; }
    .variant-tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .btn-variant { font-size: 11px; padding: 3px 10px; border-radius: 4px; border: 1px solid #2d3748;
      background: #1a1a2e; color: #94a3b8; cursor: pointer; transition: background .1s, color .1s; }
    .btn-variant:hover { background: #1e293b; color: #e2e8f0; }
    .btn-variant.active { background: #1e293b; color: #e2e8f0; border-color: #3b82f6; }
    .scene-strip { display:flex; flex-wrap:wrap; gap:5px; padding:10px 0 6px; min-width:0; }
    .scene-chip { padding:4px 10px; border-radius:4px; font-size:10px; font-family:monospace;
      cursor:pointer; background:#1e1e1e; color:#4a5568; border:1px solid #2d3748;
      white-space:nowrap; transition:background .1s, color .1s; }
    .scene-chip:hover { background:#1e293b; color:#94a3b8; }
    .scene-chip.sc-past { background:#161616; color:#374151; border-color:#161616; }
    .scene-chip.sc-active { background:#1e3a5f; color:#93c5fd; border-color:#3b82f6; }
    .transition-chip, .source-chip { padding:4px 8px; border-radius:4px; font-size:10px; font-family:monospace;
      cursor:pointer; background:#14213d; color:#93c5fd; border:1px solid #1d4ed8; white-space:nowrap; }
    .transition-chip:hover, .source-chip:hover { background:#1e3a5f; color:#bfdbfe; }
    .transition-chip.tr-book { background:#3b2413; color:#f7c678; border-color:#a16207; }
    .transition-chip.tr-motion { background:#14213d; color:#93c5fd; border-color:#1d4ed8; }
    .transition-chip.tr-none { background:#171717; color:#64748b; border-color:#334155; }
    .transition-chip.tr-stale { border-color:#ef4444; box-shadow:0 0 0 1px rgba(239,68,68,.25) inset; }
    .transition-assets { grid-column:1/-1; border-top:1px solid #1e293b; margin-top:8px; padding-top:10px; }
    .transition-assets-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:8px; }
    .transition-asset-card { border:1px solid #1e293b; border-radius:6px; padding:8px 10px; background:#0f172a; min-width:0; }
    .transition-asset-card.warning { border-color:#991b1b; background:#450a0a22; }
    .transition-asset-name { font-size:11px; color:#e2e8f0; font-family:monospace; margin-bottom:4px; }
    .transition-asset-meta { font-size:10px; color:#94a3b8; line-height:1.5; word-break:break-word; }
    .transition-asset-meta code { color:#e2e8f0; }
    .transition-asset-warning { color:#fca5a5; margin-top:4px; }
    .contract-panel { grid-column:1/-1; border-top:1px solid #1e293b; margin-top:8px; padding-top:10px; }
    .contract-title { font-size:11px; color:#cbd5e1; font-weight:600; margin-bottom:6px; }
    .contract-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:6px; }
    .contract-item { border:1px solid #1e293b; border-radius:4px; padding:6px 8px; min-width:0; }
    .contract-item .ci-label { color:#cbd5e1; font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .contract-item .ci-detail { color:#64748b; font-size:10px; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .contract-item.satisfied { border-color:#14532d; background:#052e1622; }
    .contract-item.partial { border-color:#a16207; background:#451a0322; }
    .contract-item.missing { border-color:#991b1b; background:#450a0a22; }
    .preview-loop { grid-column:1/-1; border-top:1px solid #1e293b; margin-top:8px; padding-top:10px; }
    .preview-title { font-size:11px; color:#cbd5e1; font-weight:600; margin-bottom:6px; }
    .preview-section { margin-top:8px; }
    .preview-section-label { font-size:10px; color:#64748b; margin-bottom:4px; text-transform:uppercase; letter-spacing:.06em; }
    .preview-grid { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
    .preview-card { min-width:180px; max-width:180px; border:1px solid #1e293b; border-radius:4px; padding:6px; background:#0f172a; }
    .preview-card img { width:100%; display:block; border-radius:3px; background:#020617; }
    .preview-card-label { font-size:10px; color:#cbd5e1; margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .preview-empty { font-size:11px; color:#475569; }
    .detail-actions { display:flex; gap:8px; align-items:center; justify-content:flex-end; margin-bottom:10px; }
    .compose-action-btn { font-size:11px; padding:4px 10px; border-radius:4px; border:1px solid #2d3748;
      background:#172554; color:#bfdbfe; cursor:pointer; white-space:nowrap; }
    .compose-action-btn:hover { background:#1e3a8a; color:#eff6ff; }
    .scene-panels { display:flex; flex-direction:column; gap:8px; margin-top:2px; margin-bottom:10px; min-width:0; }
    .scene-narration, .scene-subtitle { background:#1e293b; border:1px solid #334155; border-radius:6px;
      padding:10px 14px; font-size:12px; color:#cbd5e1; line-height:1.7; user-select:text; cursor:text;
      overflow-wrap:break-word; word-break:break-word; min-width:0; }
    .scene-panel-label { font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
      color:#475569; margin-bottom:4px; }
    .scene-nar-hdr { font-size:10px; color:#6366f1; font-family:monospace; margin-bottom:6px; }
    .scene-sub-hdr { font-size:10px; color:#0ea5e9; font-family:monospace; margin-bottom:6px; }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; color: #64748b; }
    .meta-grid .lbl { color: #475569; }
    .inflight-host { display: inline-flex; align-items: center; margin-left: 8px; min-height: 22px; }
    .inflight-badge { display: inline-flex; gap: 6px; align-items: center; padding: 2px 8px;
      border-radius: 10px; font-size: 11px; background: #1e3a5f; color: #93c5fd;
      border: 1px solid #3b82f6; white-space: nowrap; }
    .inflight-badge.running { animation: inflight-pulse 1.5s ease-in-out infinite; }
    .inflight-dot { width: 6px; height: 6px; border-radius: 50%; background: #60a5fa; }
    .inflight-badge .inflight-jid { font-family: monospace; opacity: 0.7; font-size: 10px; }
    .inflight-cancel { cursor: pointer; opacity: 0.65; border: 0; background: transparent; color: inherit;
      padding: 0 0 0 2px; font: inherit; line-height: 1; }
    .inflight-cancel:hover { opacity: 1; color: #f87171; }
    @keyframes inflight-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
      50% { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0); }
    }
    .recent-mutations { grid-column: 1 / -1; margin-top: 8px; padding-top: 8px; border-top: 1px solid #1e293b;
      font-size: 11px; color: #94a3b8; min-width: 0; }
    .recent-mutations h4 { font-size: 11px; margin: 0 0 6px; color: #cbd5e1; }
    .recent-mut-row { display: flex; gap: 8px; padding: 3px 0; align-items: center; min-width: 0; }
    .recent-mut-time { font-family: monospace; opacity: 0.65; font-size: 10px; }
    .recent-mut-cmd { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .recent-mut-revert { cursor: pointer; color: #93c5fd; font-size: 10px; border: 0; background: transparent; padding: 0; }
    .recent-mut-revert:hover { color: #60a5fa; text-decoration: underline; }
    .recent-mut-empty { color: #475569; font-size: 11px; }
  </style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:16px">
    <span class="header-title">Content Dashboard</span>
    <span class="header-count" id="hcount"></span>
    <a href="/channels" style="font-size:11px;color:#4a5568;text-decoration:none;padding:3px 8px;border:1px solid #2d3748;border-radius:4px;" onmouseover="this.style.color='#94a3b8'" onmouseout="this.style.color='#4a5568'">📺 Channels</a>
  </div>
  <div class="header-stats">
    <span id="sp" class="stat-pill pill-published" style="display:none"></span>
    <span id="sr" class="stat-pill pill-rendered"  style="display:none"></span>
    <span id="ss" class="stat-pill pill-storyboard" style="display:none"></span>
    <span id="live" class="live-ind">↻ live</span>
  </div>
</div>

<table>
  <thead><tr>
    <th>Status</th>
    <th>Title / ID</th>
    <th>Locale · Niche</th>
    <th>Source</th>
    <th>YouTube</th>
    <th><a href="#" onclick="sortBy('updated_at'); return false;" style="color: #4a5568; cursor: pointer; text-decoration: none;">Updated ↓</a></th>
    <th><a href="#" onclick="sortBy('published_at'); return false;" style="color: #4a5568; cursor: pointer; text-decoration: none;">Published</a></th>
    <th></th>
  </tr></thead>
  <tbody id="tbody"></tbody>
</table>

<script>
let activeId = null;
let currentData = [];
let sortField = 'updated_at';
let sortDesc = true;

function ytId(url) {
  if (!url) return null;
  const m = url.match(/[?&]v=([^&]+)/);
  return m ? m[1] : null;
}

function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('en-US', {month:'short', day:'numeric'}); }
  catch { return '—'; }
}

function sortBy(field) {
  if (sortField === field) {
    sortDesc = !sortDesc;
  } else {
    sortField = field;
    sortDesc = true;
  }
  const header = document.querySelector(`th a[onclick*="${field}"]`);
  document.querySelectorAll('th a[onclick*="sortBy"]').forEach(a => {
    a.textContent = a.textContent.replace(/\s[↑↓]$/, '');
  });
  if (header) {
    header.textContent += (sortDesc ? ' ↓' : ' ↑');
  }
  render(currentData);
}

function render(data) {
  currentData = data;
  const counts = {published:0, rendered:0, storyboard:0};
  data.forEach(p => { if (p.status in counts) counts[p.status]++; });

  document.getElementById('hcount').textContent =
    `${data.length} project${data.length !== 1 ? 's' : ''}`;

  [['sp','published'],['sr','rendered'],['ss','storyboard']].forEach(([id, s]) => {
    const el = document.getElementById(id);
    if (counts[s] > 0) { el.textContent = `${counts[s]} ${s}`; el.style.display=''; }
    else el.style.display = 'none';
  });

  // Sort data
  const sorted = [...data].sort((a, b) => {
    let aVal = a[sortField];
    let bVal = b[sortField];
    if (aVal === null || aVal === undefined) aVal = '';
    if (bVal === null || bVal === undefined) bVal = '';
    const cmp = String(aVal).localeCompare(String(bVal));
    return sortDesc ? -cmp : cmp;
  });

  // Detach the existing detail row before wiping so the <video> element survives
  const existingDetailRow = document.querySelector('tr.detail-row');
  if (existingDetailRow) existingDetailRow.remove();

  const tbody = document.getElementById('tbody');
  const prevActive = activeId;
  tbody.innerHTML = '';

  sorted.forEach(p => {
    const canPreview = p.has_video;
    const isActive = canPreview && p.project_id === prevActive;
    const srcId = ytId(p.source_url);

    const tr = document.createElement('tr');
    tr.dataset.id = p.project_id;
    tr.className = isActive ? 'active' : (p.status === 'new' ? 'dimmed' : '');

    tr.innerHTML = `
      <td><span class="badge s-${p.status}">● ${p.status}</span></td>
      <td style="max-width:280px">
        <div style="display:flex;align-items:center;min-width:0">
          <div class="t-main ${p.title ? '' : 't-miss'}">${p.title || 'No title yet'}</div>
          <span class="inflight-host" data-project-host data-project-id="${p.project_id}"></span>
        </div>
        <div class="t-id">${p.project_id}</div>
      </td>
      <td style="color:#64748b">${p.locale}${p.niche ? ' · '+p.niche : ''}</td>
      <td>${srcId
        ? `<a href="https://www.youtube.com/watch?v=${srcId}" target="_blank">${srcId} ↗</a>`
        : '<span class="nil">—</span>'}</td>
      <td>${p.youtube_video_id
        ? `<a class="yt" href="https://www.youtube.com/watch?v=${p.youtube_video_id}" target="_blank">${p.youtube_video_id} ↗</a>`
        : '<span class="nil">—</span>'}</td>
      <td style="color:#4a5568;font-size:11px">${fmtDate(p.updated_at)}</td>
      <td style="color:#4a5568;font-size:11px">${fmtDate(p.published_at)}</td>
      <td>${canPreview
        ? `<button class="btn-preview${isActive ? ' active' : ''}" data-id="${p.project_id}">▶ Preview</button>
           <div style="font-size:10px;color:#374151;margin-top:4px">${(p.video_variants||[]).map(v=>v.label).join(' · ')}</div>`
        : '<span class="nil">—</span>'}</td>`;

    tbody.appendChild(tr);
    if (isActive) {
      // Re-attach the same detail row (preserves <video> element and playback state)
      if (existingDetailRow && existingDetailRow.dataset.detailFor === p.project_id) {
        tbody.appendChild(existingDetailRow);
      } else {
        tbody.appendChild(makeDetailRow(p));
      }
    }
  });
  if (window.DashboardSSE) {
    data.forEach(p => window.DashboardSSE.sync(p.project_id));
  }

}

function transitionLabel(t, intro) {
  if (!t || !t.style || t.style === 'none') return intro ? 'intro · none' : 'none';
  const style = String(t.style).replace(/^stock-/, '');
  const dur = t.duration_sec || t.duration || '';
  const pages = t.page_count ? ` · ${t.page_count}p` : '';
  const mode = transitionModeLabel(t);
  const prefix = intro ? 'intro · ' : '';
  return `${prefix}${style}${dur ? ` · ${dur}s` : ''}${pages}${mode ? ` · ${mode}` : ''}`;
}

function transitionClass(t, freshness) {
  const style = (t && t.style) || 'none';
  const classes = ['transition-chip'];
  if (style === 'book-page-turn' || style === 'stock-book-page-turn' || style === 'page-turn') classes.push('tr-book');
  else if (style === 'none') classes.push('tr-none');
  else classes.push('tr-motion');
  if (freshness && freshness.stale) classes.push('tr-stale');
  return classes.join(' ');
}

function transitionBySeam(project) {
  const map = {};
  (project.transitions || []).forEach(t => {
    if (t.from && t.to) map[`${t.from}->${t.to}`] = t;
  });
  return map;
}

function transitionRendererMode(t) {
  if (!t) return 'generated';
  if (t.renderer_mode) return t.renderer_mode;
  return t.style === 'stock-book-page-turn' ? 'licensed_clip' : 'generated';
}

function transitionModeLabel(t) {
  const mode = transitionRendererMode(t);
  if (mode === 'licensed_clip') return 'stock clip';
  if (mode === 'overlay') return 'overlay';
  return '';
}

function transitionAssetEntries(project) {
  const entries = [];
  const intro = project.intro_transition;
  if (intro && (intro.asset_path || transitionRendererMode(intro) !== 'generated')) {
    entries.push(Object.assign({ seam: 'intro' }, intro));
  }
  (project.transitions || []).forEach((transition) => {
    if (transition.asset_path || transitionRendererMode(transition) !== 'generated') {
      entries.push(Object.assign({ seam: `${transition.from}→${transition.to}` }, transition));
    }
  });
  return entries;
}

function renderTransitionAssets(project) {
  const entries = transitionAssetEntries(project);
  if (!entries.length) return '';
  return `
    <div class="transition-assets">
      <div class="contract-title">Transition Assets</div>
      <div class="transition-assets-grid">
        ${entries.map((item) => `
          <div class="transition-asset-card${item.asset_warning ? ' warning' : ''}">
            <div class="transition-asset-name">${item.seam} · ${String(item.style || 'transition').replace(/^stock-/, '')} · ${transitionModeLabel(item) || 'generated'}</div>
            <div class="transition-asset-meta">Asset: <code>${item.asset_path || 'unset'}</code></div>
            ${item.asset_source ? `<div class="transition-asset-meta">Source: ${item.asset_source}${item.asset_source_url ? ` · <a href="${item.asset_source_url}" target="_blank">link</a>` : ''}</div>` : ''}
            ${item.asset_license ? `<div class="transition-asset-meta">License: ${item.asset_license}</div>` : ''}
            ${item.asset_notes ? `<div class="transition-asset-meta">Notes: ${item.asset_notes}</div>` : ''}
            ${item.asset_warning ? `<div class="transition-asset-warning">${item.asset_warning}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>`;
}

function buildSceneStrip(project) {
  const scenes = project.scenes || [];
  const transitions = transitionBySeam(project);
  const intro = project.intro_transition || {style: 'none'};
  const chips = scenes.map((s, i) => {
    const next = scenes[i + 1];
    const seam = next ? transitions[`${s.id}->${next.id}`] || {style: 'none'} : null;
    return `
      <div class="scene-chip" data-idx="${i}" data-start="${s.start_sec}" data-edit-token="@${s.id}">${s.id} · ${s.section}</div>
      ${next ? `<button class="${transitionClass(seam, project.render_freshness)}" type="button" data-from="${s.id}" data-to="${next.id}" data-edit-token="@${s.id}/transition">${transitionLabel(seam, false)}</button>` : ''}
    `;
  }).join('');
  return `
    <div class="scene-strip">
      ${scenes.length ? `<button class="${transitionClass(intro, project.render_freshness)}" type="button" data-intro="1" data-edit-token="@intro/transition">${transitionLabel(intro, true)}</button>` : ''}
      ${chips}
    </div>
    <div class="scene-panels">
      <div class="scene-narration">
        <div class="scene-panel-label">旁白 Narration
          <button class="source-chip nse-open-btn" type="button" style="float:right" data-edit-token="">source</button>
        </div>
        <div class="scene-nar-hdr"></div>
        <div class="scene-nar-text"></div>
      </div>
      <div class="scene-subtitle">
        <div class="scene-panel-label">字幕 Subtitle</div>
        <div class="scene-sub-hdr"></div>
        <div class="scene-sub-text"></div>
      </div>
    </div>`;
}

function makeDetailRow(p) {
  const dr = document.createElement('tr');
  dr.className = 'detail-row';
  dr.dataset.detailFor = p.project_id;
  const srcId = ytId(p.source_url);
  const tags = p.tags.slice(0, 5).join(', ') + (p.tags.length > 5 ? '…' : '');
  const variants = p.video_variants || [];
  const firstUrl = variants.length ? variants[0].url : '';
  const tabsHtml = variants.length > 1
    ? `<div class="variant-tabs">${variants.map((v, i) =>
        `<button class="btn-variant${i===0?' active':''}" data-url="${v.url}">${v.label}</button>`
      ).join('')}</div>`
    : '';
  dr.innerHTML = `<td colspan="7"><div class="detail-panel">
    <div class="detail-actions">
      <span class="inflight-host" data-project-host data-project-id="${p.project_id}"></span>
      <button class="compose-action-btn" type="button" data-compose-action="transitions" data-project-id="${p.project_id}">Recompose transitions</button>
      <button class="compose-action-btn" type="button" data-compose-action="frame" data-project-id="${p.project_id}">Recompose frame</button>
      <button class="compose-action-btn" type="button" data-compose-action="rescene" data-project-id="${p.project_id}">Recompose selected scene</button>
      <button class="compose-action-btn" type="button" data-compose-action="reburn" data-project-id="${p.project_id}">Rebuild final only</button>
      <button class="edit-mode-toggle" type="button" data-project-id="${p.project_id}">Edit mode</button>
    </div>
    ${tabsHtml}
    <video controls src="${firstUrl}" data-edit-token="@s1/visual"></video>
    ${p.scenes && p.scenes.length ? buildSceneStrip(p) : ''}
    ${renderTransitionAssets(p)}
    <div class="meta-grid">
      <div class="contract-panel" data-contract-project-id="${p.project_id}">
        <div class="contract-title">Production Contract</div>
        <div class="contract-grid">
          ${(p.render_freshness && p.render_freshness.warnings || []).map(w =>
            `<div class="contract-item missing"><div class="ci-label">Render freshness</div><div class="ci-detail">${w}</div></div>`
          ).join('') || '<div class="contract-item partial"><div class="ci-label">Production contract</div><div class="ci-detail">Loading checks...</div></div>'}
        </div>
      </div>
      <div class="preview-loop" data-preview-project-id="${p.project_id}">
        <div class="preview-title">Preview Loop</div>
        <div class="preview-empty">Loading previews...</div>
      </div>
      <div><span class="lbl">Project ID: </span><span style="font-family:monospace;color:#94a3b8">${p.project_id}</span></div>
      <div><span class="lbl">Locale: </span>${p.locale}${p.niche ? ' · '+p.niche : ''}</div>
      <div><span class="lbl">Title: </span>${p.title || '—'}</div>
      <div><span class="lbl">Published: </span>${fmtDate(p.published_at)}</div>
      <div><span class="lbl">YouTube: </span>${p.youtube_video_id
        ? `<a class="yt" href="https://www.youtube.com/watch?v=${p.youtube_video_id}" target="_blank">${p.youtube_video_id} ↗</a>`
        : '—'}</div>
      <div><span class="lbl">Source: </span>${srcId
        ? `<a href="https://www.youtube.com/watch?v=${srcId}" target="_blank">${srcId} ↗</a>`
        : '—'}</div>
      <div style="grid-column:1/-1"><span class="lbl">Tags: </span><span style="color:#475569">${tags || '—'}</span></div>
      ${p.session_logs && p.session_logs.length
        ? `<div style="grid-column:1/-1;margin-top:4px"><span class="lbl">Sessions: </span>${
            p.session_logs.map(s => {
              const color = s.outcome === 'failed' ? '#ef4444' : '#6366f1';
              const tip = [s.session_id, s.command, s.summary, s.timestamp].filter(Boolean).join(' | ');
              // UUID (36 chars with dashes) → show first 8 chars; timestamp IDs show in full
              const label = /^[0-9a-f]{8}-/.test(s.session_id) ? s.session_id.slice(0, 8) : s.session_id;
              return `<span style="font-family:monospace;font-size:11px;color:${color};margin-right:12px;cursor:default" title="${tip}">${label}</span>`;
            }).join('')
          }</div>`
        : ''}
      <div class="recent-mutations" data-project-id="${p.project_id}"></div>
    </div>
  </div></td>`;
  return dr;
}

function contractStatusClass(status) {
  if (status === 'satisfied') return 'satisfied';
  if (status === 'missing') return 'missing';
  return 'partial';
}

async function loadProductionContract(projectId, row) {
  const panel = row.querySelector(`[data-contract-project-id="${projectId}"] .contract-grid`);
  if (!panel) return;
  try {
    const resp = await fetch(`/api/projects/${encodeURIComponent(projectId)}/production-contract`);
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    const checks = data.checks || [];
    const styleItems = data.style_items || [];
    const checkHtml = checks.map(check => `
      <div class="contract-item ${contractStatusClass(check.status)}">
        <div class="ci-label">${check.label}</div>
        <div class="ci-detail">${check.detail || check.status}</div>
      </div>
    `).join('');
    const styleHtml = styleItems.filter(item => item.status === 'missing').map(item => `
      <div class="contract-item missing">
        <div class="ci-label">${item.label}</div>
        <div class="ci-detail">${item.suggested_fix || 'Update storyboard to match brief.'}</div>
      </div>
    `).join('');
    panel.innerHTML = checkHtml + styleHtml || '<div class="contract-item partial"><div class="ci-label">No contract checks</div><div class="ci-detail">No explainer/style contract available.</div></div>';
  } catch (err) {
    panel.innerHTML = '<div class="contract-item partial"><div class="ci-label">Production contract unavailable</div><div class="ci-detail">Open verify page for detailed checks.</div></div>';
  }
}

async function loadPreviewLoop(projectId, row) {
  const panel = row.querySelector(`[data-preview-project-id="${projectId}"]`);
  if (!panel) return;
  try {
    const resp = await fetch(`/api/projects/${encodeURIComponent(projectId)}/preview-loop`);
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    const scenes = data.scenes || [];
    const transitions = data.transitions || [];
    const renderSection = (label, items) => {
      if (!items.length) {
        return `<div class="preview-section"><div class="preview-section-label">${label}</div><div class="preview-empty">No previews yet.</div></div>`;
      }
      return `<div class="preview-section">
        <div class="preview-section-label">${label}</div>
        <div class="preview-grid">
          ${items.map(item => `
            <a class="preview-card" href="${item.url}" target="_blank">
              <img src="${item.url}?t=${Date.now()}" alt="${item.label}" loading="lazy">
              <div class="preview-card-label">${item.label}</div>
            </a>
          `).join('')}
        </div>
      </div>`;
    };
    panel.innerHTML = `<div class="preview-title">Preview Loop</div>`
      + renderSection('Transitions', transitions)
      + renderSection('Scenes', scenes);
  } catch (err) {
    panel.innerHTML = '<div class="preview-title">Preview Loop</div><div class="preview-empty">Preview generation unavailable.</div>';
  }
}

function toggleDetail(p) {
  const existing = document.querySelector(`tr[data-detail-for="${p.project_id}"]`);
  if (existing) {
    if (window.closeProjectSSE) window.closeProjectSSE(p.project_id);
    existing.remove();
    document.querySelector(`tr[data-id="${p.project_id}"]`)?.classList.remove('active');
    document.querySelector(`.btn-preview[data-id="${p.project_id}"]`)?.classList.remove('active');
    activeId = null;
    return;
  }
  // Close any open panel
  const open = document.querySelector('tr.detail-row');
  if (open) {
    const prevId = open.dataset.detailFor;
    if (window.closeProjectSSE) window.closeProjectSSE(prevId);
    open.remove();
    document.querySelector(`tr[data-id="${prevId}"]`)?.classList.remove('active');
    document.querySelector(`.btn-preview[data-id="${prevId}"]`)?.classList.remove('active');
  }
  // Open new panel
  const tr = document.querySelector(`tr[data-id="${p.project_id}"]`);
  tr?.classList.add('active');
  document.querySelector(`.btn-preview[data-id="${p.project_id}"]`)?.classList.add('active');
  const detailRow = makeDetailRow(p);
  tr?.insertAdjacentElement('afterend', detailRow);
  // Scroll video to viewport center once layout settles
  setTimeout(() => {
    const video = detailRow.querySelector('video');
    if (video) {
      const rect = video.getBoundingClientRect();
      const targetTop = window.scrollY + rect.top + rect.height / 2 - window.innerHeight / 2;
      window.scrollTo({ top: Math.max(0, targetTop), left: 0, behavior: 'smooth' });
    }
  }, 80);
  const narHdr  = detailRow.querySelector('.scene-nar-hdr');
  const narText = detailRow.querySelector('.scene-nar-text');
  const subHdr  = detailRow.querySelector('.scene-sub-hdr');
  const subText = detailRow.querySelector('.scene-sub-text');
  const narPanel = detailRow.querySelector('.scene-narration');
  const subPanel = detailRow.querySelector('.scene-subtitle');
  const sourceBtn = detailRow.querySelector('.nse-open-btn');
  const videoEl = detailRow.querySelector('video');
  loadProductionContract(p.project_id, detailRow);
  loadPreviewLoop(p.project_id, detailRow);

  function showSceneNar(idx) {
    const scene = p.scenes[idx];
    const mm = Math.floor(scene.start_sec / 60);
    const ss = String(Math.floor(scene.start_sec % 60)).padStart(2, '0');
    const stamp = `${scene.id} · ${scene.section} · ${mm}:${ss}`;
    narHdr.textContent = stamp;
    narText.textContent = scene.narration;
    subHdr.textContent = stamp;
    subText.textContent = scene.subtitle || '—';
    narPanel?.setAttribute('data-edit-token', `@${scene.id}/narration`);
    subPanel?.setAttribute('data-edit-token', `@${scene.id}/subtitle`);
    sourceBtn?.setAttribute('data-edit-token', `@${scene.id}/narration`);
    videoEl?.setAttribute('data-edit-token', `@${scene.id}/visual`);
  }

  // Wire variant tab clicks
  detailRow.querySelectorAll('.btn-variant').forEach(btn => {
    btn.addEventListener('click', () => {
      const vid = detailRow.querySelector('video');
      if (vid) { vid.src = btn.dataset.url; vid.load(); vid.play(); }
      detailRow.querySelectorAll('.btn-variant').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Reset scene strip — timeupdate will re-sync once video loads
      detailRow.querySelectorAll('.scene-chip').forEach(c => c.classList.remove('sc-active', 'sc-past'));
      showSceneNar(0);
    });
  });

  // Wire scene strip
  const vid = detailRow.querySelector('video');
  const strip = detailRow.querySelector('.scene-strip');
  if (vid && strip && p.scenes && p.scenes.length) {
    showSceneNar(0);

    let activeSc = -1;
    vid.addEventListener('timeupdate', () => {
      const t = vid.currentTime;
      let idx = 0;
      for (let i = 0; i < p.scenes.length; i++) {
        if (t >= p.scenes[i].start_sec) idx = i;
      }
      if (idx === activeSc) return;
      activeSc = idx;
      const chips = strip.querySelectorAll('.scene-chip');
      chips.forEach((c, i) => {
        c.classList.toggle('sc-past', i < idx);
        c.classList.toggle('sc-active', i === idx);
      });
      chips[idx]?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      showSceneNar(idx);
    });

    strip.addEventListener('click', e => {
      const chip = e.target.closest('.scene-chip');
      if (!chip) return;
      const idx = +chip.dataset.idx;
      vid.currentTime = p.scenes[idx].start_sec;
      showSceneNar(idx);
    });
  }
  detailRow.querySelector('.edit-mode-toggle')?.addEventListener('click', () => {
    window.EditMode?.toggle(p.project_id);
  });
  window.EditMode?.attach(p.project_id);
  if (window.openProjectSSE) window.openProjectSSE(p.project_id);
  activeId = p.project_id;
}

async function refresh() {
  const ind = document.getElementById('live');
  try {
    const resp = await fetch('/api/projects');
    if (!resp.ok) throw new Error(resp.status);
    render(await resp.json());
    ind.classList.add('pulse');
    setTimeout(() => ind.classList.remove('pulse'), 500);
    ind.textContent = '↻ live';
    ind.style.color = '';
  } catch (e) {
    ind.textContent = '↻ error';
    ind.style.color = '#ef4444';
  }
}

async function triggerComposeAction(projectId, action, detailRow) {
  let url = `/api/compose/${encodeURIComponent(projectId)}/${action}`;
  let options = { method: 'POST', headers: { 'Content-Type': 'application/json' } };
  if (action === 'rescene') {
    const activeChip = detailRow.querySelector('.scene-chip.sc-active') || detailRow.querySelector('.scene-chip');
    if (!activeChip) return;
    const project = currentData.find(p => p.project_id === projectId);
    if (!project) return;
    const scene = project.scenes[+activeChip.dataset.idx];
    if (!scene) return;
    options.body = JSON.stringify({ scenes: [scene.id] });
  } else if (action === 'reburn') {
    options.body = JSON.stringify({ variant: '' });
  } else {
    options.body = JSON.stringify({});
  }
  const resp = await fetch(url, options);
  if (!resp.ok) {
    const body = await resp.json().catch(() => ({}));
    throw new Error(body.detail || `compose ${action} failed`);
  }
}

// Persistent preview-button handler — lives outside render() so it survives re-renders
document.getElementById('tbody').addEventListener('click', e => {
  const btn = e.target.closest('.btn-preview');
  if (!btn) return;
  const p = currentData.find(x => x.project_id === btn.dataset.id);
  if (p) toggleDetail(p);
});

refresh();
setInterval(refresh, 30000);
</script>

<script>
  function refreshActiveVideo(projectId, path) {
    const row = document.querySelector(`tr[data-detail-for="${projectId}"]`);
    if (!row) return;
    const video = row.querySelector('video');
    if (!video) return;
    const base = path ? `/output/${projectId}/${path}` : video.src.split('?')[0];
    video.src = `${base}?t=${Date.now()}`;
    video.load();
  }

  function refreshSceneImage(projectId, path) {
    const scene = path.replace('images/scenes/', '').replace(/\.[^.]+$/, '');
    const img = document.querySelector(
      `[data-project-id="${projectId}"] img[data-scene-id="${scene}"]`
    );
    if (img) img.src = `${img.src.split('?')[0]}?t=${Date.now()}`;
  }

  async function refreshProjectDetail(projectId) {
    const wasActive = activeId === projectId;
    document.querySelector(`tr[data-detail-for="${projectId}"]`)?.remove();
    if (wasActive) activeId = null;
    await refresh();
    if (!wasActive) return;
    const project = currentData.find(p => p.project_id === projectId);
    if (project) toggleDetail(project);
  }

  window.openProjectSSE = function (projectId) {
    window.DashboardSSE.open(projectId, {
      onFilesChanged: function (paths) {
        paths.forEach(function (path) {
          if (path === 'storyboard.json') {
            refreshProjectDetail(projectId).then(function () {
              window.DashboardSSE.renderRecentMutations(projectId);
            });
          } else if (path.indexOf('compose/') === 0 && path.indexOf('.mp4') > -1) {
            refreshActiveVideo(projectId, path);
          } else if (path.indexOf('images/scenes/') === 0) {
            refreshSceneImage(projectId, path);
          } else if (path.indexOf('narration_overrides/') === 0 && window.NarrationSourceEditor) {
            refresh();
          }
        });
      },
    });
    window.DashboardSSE.renderRecentMutations(projectId);
  };

  window.closeProjectSSE = function (projectId) {
    window.DashboardSSE.close(projectId);
  };

  window.renderRecentMutations = window.DashboardSSE.renderRecentMutations;
</script>
<script>
  // Wire the source chip: opens NarrationSourceEditor for the active scene when edit mode is off.
  document.getElementById('tbody').addEventListener('click', (e) => {
    const btn = e.target.closest('.nse-open-btn');
    if (!btn) return;
    const detailRow = btn.closest('tr.detail-row');
    if (!detailRow) return;
    const projectId = detailRow.dataset.detailFor;
    const project = currentData.find((p) => p.project_id === projectId);
    if (!project) return;
    // Use the currently-displayed scene from the strip's active chip.
    const activeChip = detailRow.querySelector('.scene-chip.sc-active')
                       || detailRow.querySelector('.scene-chip');
    if (!activeChip) return;
    const idx = +activeChip.dataset.idx;
    const scene = project.scenes[idx];
    if (!scene) return;
    window.NarrationSourceEditor.open({
      projectId,
      scene: scene.id,
      narrationText: scene.narration || '',
      locale: project.locale || 'zh-TW',
    });
  });

  // Transition chips open the direct editor when edit mode is off.
  document.getElementById('tbody').addEventListener('click', (e) => {
    const chip = e.target.closest('.transition-chip');
    if (!chip || window.EditMode?.isEnabled()) return;
    const detailRow = chip.closest('tr.detail-row');
    if (!detailRow || !window.TransitionEditor) return;
    const project = currentData.find(p => p.project_id === detailRow.dataset.detailFor);
    const transitions = project ? transitionBySeam(project) : {};
    if (chip.dataset.intro) {
      window.TransitionEditor.openIntro(
        detailRow.dataset.detailFor,
        { current: project ? project.intro_transition : null },
      );
      return;
    }
    window.TransitionEditor.open(
      detailRow.dataset.detailFor,
      chip.dataset.from,
      chip.dataset.to,
      { current: transitions[`${chip.dataset.from}->${chip.dataset.to}`] || null },
    );
  });

  document.getElementById('tbody').addEventListener('click', async (e) => {
    const btn = e.target.closest('.compose-action-btn');
    if (!btn) return;
    const detailRow = btn.closest('tr.detail-row');
    if (!detailRow) return;
    const action = btn.dataset.composeAction;
    const projectId = detailRow.dataset.detailFor;
    const previous = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Running...';
    try {
      await triggerComposeAction(projectId, action, detailRow);
    } catch (err) {
      console.warn(err);
      btn.textContent = 'Failed';
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = previous;
      }, 1200);
      return;
    }
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = previous;
    }, 1200);
  });
</script>
